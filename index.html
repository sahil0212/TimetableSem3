<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Class, Faster</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --cream:#F6EFDD;
    --navy:#1B2A4A;
    --gold:#B7791F;
    --ink:#2B2B2B;
    --card:#FFFEF9;
    --line:#E4D9BE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--navy);
    font-family:'Inter',sans-serif;
    padding-bottom:60px;
  }
  .wrap{max-width:720px;margin:0 auto;padding:28px 20px;}

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    letter-spacing:3px;
    color:var(--gold);
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
  }
  .college-logo{
    height:56px;
    display:block;
    margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:44px;
    line-height:1.05;
    margin:10px 0 16px;
    font-weight:700;
  }
  h1 em{color:var(--gold);font-style:italic;}
  .welcome-line{
    font-family:'Fraunces',serif;
    font-size:28px;
    font-weight:700;
    color:var(--navy);
    margin:6px 0 8px;
  }
  .welcome-line em{color:var(--gold);font-style:italic;}
  .profile-line{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--navy);
    background:var(--card);
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    margin-bottom:18px;
  }
  p.sub{font-size:16px;line-height:1.5;color:#4a4a4a;margin-bottom:24px;max-width:520px;}

  input[type="text"]{
    width:100%;
    padding:16px 16px 16px 44px;
    font-size:16px;
    border:2px solid var(--navy);
    border-radius:12px;
    background:var(--card) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="%23555" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') 14px center / 18px no-repeat;
    font-family:'Inter',sans-serif;
    color:var(--navy);
  }
  input[type="text"]:focus{outline:3px solid var(--gold);outline-offset:1px;}

  .days{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0;}
  .day-btn{
    flex:1 1 auto;
    min-width:90px;
    padding:12px 14px;
    border-radius:999px;
    border:2px solid var(--navy);
    background:var(--card);
    color:var(--navy);
    font-family:'JetBrains Mono',monospace;
    font-weight:500;
    font-size:14px;
    cursor:pointer;
    text-align:center;
    transition:all .15s ease;
  }
  .day-btn.active{background:var(--navy);color:var(--cream);}
  .day-btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}

  .upnext{
    background:var(--navy);
    color:var(--cream);
    border-radius:14px;
    padding:20px;
    margin:22px 0;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .upnext .dot{
    width:14px;height:14px;border-radius:50%;
    background:var(--gold);
    flex-shrink:0;
  }
  .upnext .txt{font-size:16px;line-height:1.5;}
  .upnext b{font-family:'JetBrains Mono',monospace;}
  .upnext .badge{
    margin-left:auto;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    border:1px solid var(--gold);
    color:var(--gold);
    padding:6px 12px;
    border-radius:999px;
    white-space:nowrap;
  }
  .upnext.empty{opacity:.7;}

  .attendance-section{
    background:var(--card);
    border:2px solid var(--navy);
    border-radius:12px;
    margin:18px 0;
    overflow:hidden;
  }
  .attendance-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 16px;
    cursor:pointer;
    user-select:none;
  }
  .att-title{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:13px;
    letter-spacing:1px;
    color:var(--navy);
  }
  .att-overall{
    margin-left:auto;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    font-weight:700;
    color:var(--gold);
  }
  .att-arrow{
    font-size:14px;
    color:var(--navy);
    transition:transform .2s ease;
  }
  .attendance-section.open .att-arrow{transform:rotate(180deg);}
  .attendance-body{
    display:none;
    padding:0 16px 16px;
    border-top:1px solid var(--line);
  }
  .attendance-section.open .attendance-body{display:block;}
  .att-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 0;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .att-row:last-child{border-bottom:none;}
  .att-code{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:16px;
    min-width:60px;
  }
  .att-stats{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:#666;
    flex:1 1 auto;
  }
  .att-pct{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:13px;
    padding:3px 9px;
    border-radius:999px;
  }
  .att-pct.good{background:#e3f2df;color:#2f6b2a;}
  .att-pct.warn{background:#fdeecb;color:var(--gold);}
  .att-pct.bad{background:#fbdede;color:#a13636;}
  .att-btns{display:flex;gap:6px;}
  .att-btn{
    border:1.5px solid var(--navy);
    background:var(--cream);
    color:var(--navy);
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:700;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
  }
  .att-btn.present{border-color:#2f6b2a;color:#2f6b2a;}
  .att-btn.absent{border-color:#a13636;color:#a13636;}
  .att-btn:active{transform:scale(0.95);}
  .att-count-line{display:inline-block;}
  .att-mini{
    border:1px solid #ccc;
    background:var(--cream);
    color:#666;
    width:18px;
    height:18px;
    line-height:16px;
    border-radius:50%;
    font-size:12px;
    font-family:'JetBrains Mono',monospace;
    cursor:pointer;
    padding:0;
    margin:0 4px;
  }
  .att-mini:active{transform:scale(0.9);}
  .att-reset{
    text-align:right;
    margin-top:6px;
  }
  .att-sync-status{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:#999;
    margin-right:10px;
  }
  .setup-box{
    background:#fdf6e3;
    border:1.5px dashed var(--gold);
    border-radius:10px;
    padding:14px;
    margin-bottom:14px;
  }
  .setup-title{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:13px;
    color:var(--navy);
    margin-bottom:6px;
  }
  .setup-desc{
    font-size:13px;
    color:#555;
    margin:0 0 10px;
    line-height:1.4;
  }
  .setup-status{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:#555;
    line-height:1.6;
  }
  .setup-id{
    display:inline-block;
    background:var(--navy);
    color:var(--cream);
    font-weight:700;
    padding:6px 12px;
    border-radius:6px;
    margin:4px 0;
    font-size:15px;
    letter-spacing:1px;
  }
  .setup-note{color:#888;font-size:12px;}
  .att-reset button{
    background:none;
    border:none;
    color:#999;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-decoration:underline;
    cursor:pointer;
  }

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:26px 0 14px;
    font-family:'JetBrains Mono',monospace;
  }
  .count{font-weight:700;}
  .view-toggle{display:flex;border:2px solid var(--navy);border-radius:999px;overflow:hidden;}
  .view-toggle button{
    border:none;background:var(--card);color:var(--navy);
    padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;
  }
  .view-toggle button.active{background:var(--navy);color:var(--cream);}

  .day-heading{
    font-family:'JetBrains Mono',monospace;
    color:var(--gold);
    font-weight:700;
    letter-spacing:2px;
    margin:26px 0 10px;
    border-bottom:1px solid var(--line);
    padding-bottom:8px;
  }

  .card{
    background:var(--card);
    border-left:4px solid var(--navy);
    border-radius:8px;
    padding:16px 18px;
    margin-bottom:12px;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .card .code{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:20px;
    text-decoration:underline;
    text-decoration-style:dotted;
    text-decoration-color:var(--gold);
    text-underline-offset:4px;
  }
  .card .fullname{font-size:13px;color:#777;margin-top:2px;}
  .card .faculty{font-family:'Fraunces',serif;font-size:18px;margin:6px 0;}
  .card.break-card{
    border-left:4px dashed var(--gold);
    background:transparent;
    box-shadow:none;
    padding:12px 18px;
  }
  .break-label{
    font-family:'JetBrains Mono',monospace;
    color:var(--gold);
    font-weight:700;
    font-size:13px;
    letter-spacing:1px;
  }
  .card .meta{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:#555;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-items:center;
  }
  .card .meta .room{text-decoration:underline;text-decoration-style:dotted;}
  .card .meta .time{color:var(--gold);font-weight:700;margin-left:auto;}
  .card .dot-sep{color:var(--gold);}

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:#777;
    font-family:'JetBrains Mono',monospace;
  }

  /* Grid view */
  .grid-view{display:grid;grid-template-columns:1fr;gap:10px;}
  @media(min-width:600px){
    .grid-view{grid-template-columns:repeat(2,1fr);}
  }
  .grid-day-col{background:var(--card);border-radius:10px;padding:12px;}
  .grid-day-col h3{
    font-family:'JetBrains Mono',monospace;
    color:var(--gold);
    font-size:13px;
    letter-spacing:2px;
    margin:0 0 10px;
  }
  .grid-slot{
    border-left:3px solid var(--navy);
    padding:8px 10px;
    margin-bottom:8px;
    background:var(--cream);
    border-radius:6px;
    font-size:13px;
  }
  .grid-slot .gcode{font-weight:700;font-family:'Fraunces',serif;font-size:15px;}
  .grid-slot .gtime{color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;}
  .grid-slot.grid-break{
    border-left:3px dashed var(--gold);
    background:transparent;
  }

  .hidden{display:none !important;}
</style>
</head>

// Lunch breaks — shown in the schedule but not counted/searched as classes
const breaks = [
  { day:"Monday", start:"13:30", end:"14:00" },
  { day:"Wednesday", start:"13:30", end:"14:00" },
  { day:"Tuesday", start:"13:05", end:"13:40" },
  { day:"Thursday", start:"13:05", end:"13:40" },
];

const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

let activeDay = null; // null = all days
let searchTerm = "";
let currentView = "list";

const dayFilterEl = document.getElementById('dayFilter');
const searchEl = document.getElementById('search');
const listViewEl = document.getElementById('listView');
const gridViewEl = document.getElementById('gridView');
const countEl = document.getElementById('count');
const upNextEl = document.getElementById('upNext');
const btnList = document.getElementById('btnList');
const btnGrid = document.getElementById('btnGrid');

function buildDayFilters(){
  dayFilterEl.innerHTML = "";
  DAYS.forEach(d=>{
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (activeDay===d ? ' active':'');
    btn.textContent = d;
    btn.setAttribute('aria-pressed', activeDay===d);
    btn.onclick = ()=>{
      activeDay = (activeDay===d) ? null : d;
      render();
    };
    dayFilterEl.appendChild(btn);
  });
}

function matchesSearch(item){
  if(!searchTerm) return true;
  const t = searchTerm.toLowerCase();
  return item.code.toLowerCase().includes(t)
      || (item.fullName && item.fullName.toLowerCase().includes(t))
      || (item.subCode && item.subCode.toLowerCase().includes(t))
      || item.faculty.toLowerCase().includes(t)
      || item.room.toLowerCase().includes(t)
      || (item.type && item.type.toLowerCase().includes(t))
      || (item.stream && item.stream.toLowerCase().includes(t))
      || (item.section && item.section.toLowerCase().includes(t));
}

function fmtTime(t){
  const [h,m] = t.split(':').map(Number);
  const period = h>=12 ? 'PM':'AM';
  const h12 = ((h+11)%12)+1;
  return `${h12}:${m.toString().padStart(2,'0')} ${period}`;
}

function getFiltered(){
  return schedule.filter(item=>{
    const dayOk = activeDay ? item.day===activeDay : true;
    return dayOk && matchesSearch(item);
  });
}

function renderList(){
  const filtered = getFiltered();
  listViewEl.innerHTML = "";
  if(filtered.length===0){
    listViewEl.innerHTML = `<div class="empty-state">No classes match. Try a different search or day.</div>`;
    return;
  }
  const daysToShow = activeDay ? [activeDay] : DAYS;
  const grouped = {};
  filtered.forEach(item=>{
    if(!grouped[item.day]) grouped[item.day]=[];
    grouped[item.day].push(item);
  });
  let anyRendered = false;
  daysToShow.forEach(day=>{
    if(!grouped[day]) return;
    anyRendered = true;
    const heading = document.createElement('div');
    heading.className = 'day-heading';
    heading.textContent = day.toUpperCase();
    listViewEl.appendChild(heading);

    const dayBreaks = breaks.filter(b=>b.day===day).map(b=>({...b, isBreak:true}));
    const merged = [...grouped[day], ...dayBreaks].sort((a,b)=>a.start.localeCompare(b.start));

    merged.forEach(item=>{
      const card = document.createElement('div');
      if(item.isBreak){
        card.className = 'card break-card';
        card.innerHTML = `
          <div class="break-label">LUNCH BREAK</div>
          <div class="meta"><span class="time">${fmtTime(item.start)} – ${fmtTime(item.end)}</span></div>`;
      } else {
        card.className = 'card';
        card.innerHTML = `
          <div class="code">${item.code}</div>
          <div class="fullname">${item.fullName || ''}</div>
          <div class="faculty">${item.faculty}</div>
          <div class="meta">
            <span class="room">${item.room}</span>
            <span class="dot-sep">•</span>
            <span>${item.section ? 'Sec ' + item.section : ''}</span>
            <span class="dot-sep">•</span>
            <span>${item.type || ''}${item.stream ? ' · ' + item.stream : ''}</span>
            <span class="time">${fmtTime(item.start)} – ${fmtTime(item.end)}</span>
          </div>`;
      }
      listViewEl.appendChild(card);
    });
  });
  if(!anyRendered){
    listViewEl.innerHTML = `<div class="empty-state">No classes match. Try a different search or day.</div>`;
  }
}

function renderGrid(){
  const filtered = getFiltered();
  gridViewEl.innerHTML = "";
  const grouped = {};
  filtered.forEach(item=>{
    if(!grouped[item.day]) grouped[item.day]=[];
    grouped[item.day].push(item);
  });
  const daysToShow = activeDay ? [activeDay] : DAYS;
  daysToShow.forEach(day=>{
    const col = document.createElement('div');
    col.className = 'grid-day-col';
    const dayBreaks = breaks.filter(b=>b.day===day).map(b=>({...b, isBreak:true}));
    const items = [...(grouped[day]||[]), ...dayBreaks].sort((a,b)=>a.start.localeCompare(b.start));
    col.innerHTML = `<h3>${day.toUpperCase()}</h3>` + (items.length ? items.map(item=>
      item.isBreak
      ? `<div class="grid-slot grid-break"><div class="gcode">Lunch Break</div><div class="gtime">${fmtTime(item.start)}–${fmtTime(item.end)}</div></div>`
      : `<div class="grid-slot">
        <div class="gcode">${item.code}${item.section ? ' · Sec ' + item.section : ''}</div>
        <div>${item.faculty}</div>
        <div class="gtime">${item.room} · ${fmtTime(item.start)}–${fmtTime(item.end)}</div>
      </div>`
    ).join('') : `<div style="font-size:12px;color:#999;">No classes</div>`);
    gridViewEl.appendChild(col);
  });
}

function minutesSinceWeekStart(dayName, hh, mm){
  const idx = DAYS.indexOf(dayName); // Monday=0
  return idx*1440 + hh*60 + mm;
}

function renderUpNext(){
  const now = new Date();
  const jsDay = now.getDay(); // 0=Sun..6=Sat
  const dayMap = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const nowDayName = dayMap[jsDay];
  const nowMinutesInWeek = (jsDay===0 ? 6 : jsDay-1)*1440 + now.getHours()*60 + now.getMinutes();

  let best = null, bestDiff = Infinity;
  schedule.forEach(item=>{
    if(!DAYS.includes(item.day)) return;
    const [h,m] = item.start.split(':').map(Number);
    let slotMinutes = minutesSinceWeekStart(item.day,h,m);
    let diff = slotMinutes - nowMinutesInWeek;
    if(diff < 0) diff += 7*1440; // wrap to next week
    if(diff < bestDiff){ bestDiff = diff; best = item; }
  });

  if(!best){
    upNextEl.className = "upnext empty";
    upNextEl.innerHTML = `<div class="dot"></div><div class="txt">No upcoming classes found.</div>`;
    return;
  }
  const hrs = Math.floor(bestDiff/60);
  const mins = bestDiff%60;
  const inStr = hrs>0 ? `${hrs}h ${mins}m` : `${mins}m`;
  upNextEl.className = "upnext";
  upNextEl.innerHTML = `
    <div class="dot"></div>
    <div class="txt">Up next: <b>${best.code}</b> with <b>${best.faculty}</b> at ${fmtTime(best.start)} (in ${inStr})</div>
    <div class="badge">${best.day.toUpperCase()}</div>
  `;
}

function render(){
  buildDayFilters();
  const filtered = getFiltered();
  countEl.textContent = `${filtered.length} class${filtered.length!==1?'es':''} shown`;
  if(currentView==='list'){
    renderList();
  } else {
    renderGrid();
  }
  renderUpNext();
}

/* ==================== ATTENDANCE TRACKER (cloud-synced) ==================== */
const ATT_KEY = 'attendance-data-v1';

// ---- ONE-TIME SETUP ----
// This starts empty. The first time the page runs, use the "Set up cloud sync"
// button in the Attendance panel to create a real shared storage bucket.
// It will show you an ID — send that ID back so it can be hardcoded here
// permanently. Until then, attendance only saves on this device.
const BUCKET_ID = ''; // <-- will be filled in once, e.g. 'aB3xY9kP'

const KV_BASE = BUCKET_ID ? `https://kvdb.io/${BUCKET_ID}/sahil-ibs-sem3-attendance` : null;
const SYNC_INTERVAL_MS = 15000; // poll every 15 seconds for updates from other devices

const DEFAULT_SEED = {
  AI:  { present:10, absent:0 },
  BMS: { present:10, absent:0 },
  BPI: { present:7,  absent:0 },
  BS:  { present:7,  absent:1 },
  CRL: { present:10, absent:0 },
  CRM: { present:10, absent:0 },
  ETB: { present:10, absent:0 },
  MA:  { present:7,  absent:1 },
};

function loadLocalAttendance(){
  try{
    const raw = localStorage.getItem(ATT_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}
function saveLocalAttendance(data){
  try{ localStorage.setItem(ATT_KEY, JSON.stringify(data)); }catch(e){}
}

let attendance = loadLocalAttendance() || DEFAULT_SEED; // local copy, shown immediately while cloud loads
let syncStatusEl = null;

function setSyncStatus(msg){
  if(syncStatusEl) syncStatusEl.textContent = msg;
}

async function createSyncBucket(){
  const statusBox = document.getElementById('setupStatus');
  statusBox.textContent = 'Creating shared storage…';
  try{
    const res = await fetch('https://kvdb.io/', { method:'POST' });
    if(res.ok){
      const newBucketId = (await res.text()).trim();
      statusBox.innerHTML = `
        ✅ Created! Your Bucket ID is:<br>
        <span class="setup-id">${newBucketId}</span><br>
        <span class="setup-note">Copy this and send it back so it can be saved permanently for everyone.</span>
      `;
    } else {
      statusBox.textContent = 'Could not create storage (server error). Try again in a moment.';
    }
  } catch(e){
    statusBox.textContent = 'Could not create storage — check your internet connection and try again.';
  }
}

async function fetchCloudAttendance(){
  if(!KV_BASE) return null;
  try{
    const res = await fetch(KV_BASE, { cache:'no-store' });
    if(res.ok){
      const text = await res.text();
      if(text && text.trim()){
        return JSON.parse(text);
      }
    }
  }catch(e){ /* offline or blocked — fall back silently */ }
  return null;
}

async function pushCloudAttendance(data){
  if(!KV_BASE){ setSyncStatus('Cloud sync not set up yet'); return; }
  try{
    await fetch(KV_BASE, { method:'PUT', body: JSON.stringify(data) });
    setSyncStatus('Synced ✓');
  }catch(e){
    setSyncStatus('Offline — saved on this device only');
  }
}

async function syncFromCloud(silent){
  if(!KV_BASE) return;
  const cloudData = await fetchCloudAttendance();
  if(cloudData){
    attendance = cloudData;
    saveLocalAttendance(attendance);
    renderAttendance();
    if(!silent) setSyncStatus('Synced ✓');
  } else if(!silent){
    setSyncStatus('Offline — showing last saved data');
  }
}

function getUniqueSubjects(){
  const seen = {};
  schedule.forEach(item=>{
    if(!seen[item.code]) seen[item.code] = item.fullName || item.code;
  });
  return Object.keys(seen).map(code=>({ code, fullName: seen[code] }));
}

function pctClass(pct){
  if(pct >= 85) return 'good';
  if(pct >= 75) return 'warn';
  return 'bad';
}

function renderAttendance(){
  const subjects = getUniqueSubjects();
  const attBody = document.getElementById('attBody');
  const attOverall = document.getElementById('attOverall');

  let totalP = 0, totalA = 0;
  attBody.innerHTML = "";

  if(!BUCKET_ID){
    const setupBox = document.createElement('div');
    setupBox.className = 'setup-box';
    setupBox.innerHTML = `
      <div class="setup-title">⚙️ One-time setup needed for cross-device sync</div>
      <p class="setup-desc">Attendance below is saved on this device only. Tap once (needs internet) to create shared storage:</p>
      <button id="setupBtn" class="att-btn present" style="margin-bottom:6px;">Set up cloud sync</button>
      <div id="setupStatus" class="setup-status"></div>
    `;
    attBody.appendChild(setupBox);
  }

  subjects.forEach(sub=>{
    const rec = attendance[sub.code] || { present:0, absent:0 };
    const total = rec.present + rec.absent;
    const pct = total > 0 ? Math.round((rec.present/total)*100) : 100;
    totalP += rec.present;
    totalA += rec.absent;

    const row = document.createElement('div');
    row.className = 'att-row';
    row.innerHTML = `
      <div class="att-code">${sub.code}</div>
      <div class="att-stats">${sub.fullName}<br>
        <span class="att-count-line">
          ${rec.present} present
          <button class="att-mini" data-code="${sub.code}" data-action="present" data-dir="-1" title="Undo one present">−</button>
          · ${rec.absent} absent
          <button class="att-mini" data-code="${sub.code}" data-action="absent" data-dir="-1" title="Undo one absent">−</button>
          ${total>0 ? ` · ${total} total` : ''}
        </span>
      </div>
      <div class="att-pct ${pctClass(pct)}">${total>0 ? pct+'%' : '—'}</div>
      <div class="att-btns">
        <button class="att-btn present" data-code="${sub.code}" data-action="present" data-dir="1">+ Present</button>
        <button class="att-btn absent" data-code="${sub.code}" data-action="absent" data-dir="1">+ Absent</button>
      </div>
    `;
    attBody.appendChild(row);
  });

  const resetWrap = document.createElement('div');
  resetWrap.className = 'att-reset';
  resetWrap.innerHTML = `<span id="attSyncStatus" class="att-sync-status"></span> <button id="attResetAll">Reset all attendance</button>`;
  attBody.appendChild(resetWrap);
  syncStatusEl = document.getElementById('attSyncStatus');

  if(!BUCKET_ID){
    setSyncStatus('');
    document.getElementById('setupBtn').addEventListener('click', createSyncBucket);
  }

  const overallTotal = totalP + totalA;
  const overallPct = overallTotal > 0 ? Math.round((totalP/overallTotal)*100) : null;
  attOverall.textContent = overallPct !== null ? `${overallPct}% overall` : 'No data yet';

  attBody.querySelectorAll('.att-btn, .att-mini').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const code = btn.dataset.code;
      const action = btn.dataset.action;
      const dir = parseInt(btn.dataset.dir, 10);
      if(!attendance[code]) attendance[code] = { present:0, absent:0 };
      attendance[code][action] = Math.max(0, attendance[code][action] + dir);
      saveLocalAttendance(attendance);
      renderAttendance();
      setSyncStatus('Syncing…');
      await pushCloudAttendance(attendance);
    });
  });

  document.getElementById('attResetAll').addEventListener('click', async ()=>{
    if(confirm('Reset all attendance records for everyone?')){
      attendance = {};
      saveLocalAttendance(attendance);
      renderAttendance();
      setSyncStatus('Syncing…');
      await pushCloudAttendance(attendance);
    }
  });
}

const attSection = document.querySelector('.attendance-section');
document.getElementById('attToggle').addEventListener('click', ()=>{
  attSection.classList.toggle('open');
});

renderAttendance();
syncFromCloud(false);
setInterval(()=>syncFromCloud(true), SYNC_INTERVAL_MS);

</script>
</body>
